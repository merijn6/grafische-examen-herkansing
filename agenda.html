<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - Vom Aventus</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="navbar-container">
      <a href="#" class="logo">
        <img src="images/VOM-Logo-removebg-preview.png" alt="VOM Aventus">
      </a>

      <div class="nav-menu">
        <a href="gallery.html" class="nav-link">gallery</a>
        <a href="agenda.html" class="nav-link">agenda</a>
        <a href="#" class="nav-link">sign up</a>
      </div>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="agenda-container">

    <div class="agenda-layout">

      <!-- LEFT: EVENTS -->
      <div class="event-list">

        <div class="event-card">
          <div class="color-bar blue-bar"></div>
          <div class="event-content">
            <h3 class="event-title">eten</h3>
            <p class="event-details">Jun 20 2026 • 09:00-18:00 • LAVM</p>
          </div>
        </div>

        <div class="event-card">
          <div class="color-bar green-bar"></div>
          <div class="event-content">
            <h3 class="event-title">eten</h3>
            <p class="event-details">Jun 20 2026 • 09:00-18:00 • LAVM</p>
          </div>
        </div>

        <div class="event-card">
          <div class="color-bar pink-bar"></div>
          <div class="event-content">
            <h3 class="event-title">eten</h3>
            <p class="event-details">Jun 20 2026 • 09:00-18:00 • LAVM</p>
          </div>
        </div>

        <div class="event-card">
          <div class="color-bar orange-bar"></div>
          <div class="event-content">
            <h3 class="event-title">eten</h3>
            <p class="event-details">Jun 20 2026 • 09:00-18:00 • LAVM</p>
          </div>
        </div>

      </div>

      <!-- RIGHT: SIDEBAR -->
      <div class="agenda-sidebar">

        <div class="page-header">
          <p class="download-text">Download de planning <a>hier</a></p>

          <div class="search-container">
            <input type="text" class="search-input" placeholder="search" />
          </div>
        </div>

        <div class="filter-tags">
          <span class="tag outside"><span class="dot"></span>buiten</span>
          <span class="tag eten"><span class="dot"></span>eten</span>
          <span class="tag rondleiding"><span class="dot"></span>rondleiding</span>
          <span class="tag museum"><span class="dot"></span>museum</span>
        </div>

      </div>

    </div>

  </div>

</body>
</html>
